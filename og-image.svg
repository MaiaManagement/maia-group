<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0F2847"/>
      <stop offset="100%" stop-color="#070E1A"/>
    </radialGradient>
    <radialGradient id="glow" cx="75%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#F26522" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F26522" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <mask id="gridMask">
      <radialGradient id="gridFade" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="white" stop-opacity="1"/>
        <stop offset="80%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <rect width="1200" height="630" fill="url(#gridFade)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Orange accent line -->
  <rect x="120" y="280" width="48" height="2" fill="#F26522"/>

  <!-- "The" -->
  <text x="120" y="248" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="300" fill="#9E9A92">The</text>

  <!-- MAIA -->
  <text x="116" y="370" font-family="Georgia, serif" font-size="130" font-weight="500" fill="#EAE6E0" letter-spacing="-2">Maia</text>

  <!-- GROUP -->
  <text x="122" y="420" font-family="'Arial', sans-serif" font-size="36" font-weight="300" fill="#9E9A92" letter-spacing="12">GROUP</text>

  <!-- Tagline -->
  <text x="120" y="480" font-family="Georgia, serif" font-size="20" font-style="italic" font-weight="300" fill="#6B665C">Construyendo el Futuro de Santa Marta</text>

  <!-- Location pill -->
  <rect x="120" y="516" width="230" height="28" rx="14" fill="rgba(242,101,34,0.1)" stroke="rgba(242,101,34,0.25)" stroke-width="1"/>
  <text x="235" y="534" font-family="'Arial', sans-serif" font-size="11" font-weight="600" fill="#F26522" text-anchor="middle" letter-spacing="2">SANTA MARTA, COLOMBIA</text>

  <!-- Right: brand count callout -->
  <text x="1080" y="310" font-family="Georgia, serif" font-size="80" font-weight="500" fill="#F26522" text-anchor="middle" opacity="0.9">11</text>
  <text x="1080" y="345" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="#6B665C" text-anchor="middle" letter-spacing="2">MARCAS</text>
  <line x1="1080" y1="360" x2="1080" y2="361" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1080" y="390" font-family="Georgia, serif" font-size="52" font-weight="500" fill="#EAE6E0" text-anchor="middle" opacity="0.7">8+</text>
  <text x="1080" y="420" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="#6B665C" text-anchor="middle" letter-spacing="2">INDUSTRIAS</text>
</svg>
